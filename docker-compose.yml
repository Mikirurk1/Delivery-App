services:
  mongo:
    image: mongo:7
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  server:
    build:
      context: ./server
    environment:
      PORT: 4000
      CLIENT_URL: http://localhost:3000,http://localhost:3001
      DATABASE_URL: mongodb://mongo:27017/delivery
      JWT_SECRET: local-dev-jwt-secret
    depends_on:
      - mongo
    ports:
      - "4000:4000"

  client:
    build:
      context: ./client
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:4000/graphql
    depends_on:
      - server
    ports:
      - "3000:3000"

volumes:
  mongo_data:
